<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revizo - Géométrie</title>
    <meta name="description" content="Teste tes connaissances en géométrie : cercle, droites, figures, angles et mesures. Niveaux CE2, CM1, CM2.">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#764ba2">
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Changer le thème">🌙</button>

    <div class="stars" id="stars"></div>
    <canvas id="confetti-canvas"></canvas>

    <!-- ══════════════ ÉCRAN D'ACCUEIL ══════════════ -->
    <div id="start-screen">
        <h1>📐 Géométrie Toto</h1>
        <p>Teste tes connaissances en géométrie</p>

        <div class="level-tabs">
            <button class="level-tab active" data-level="ce2" onclick="selectLevel('ce2')">CE2</button>
            <button class="level-tab" data-level="cm1" onclick="selectLevel('cm1')">CM1</button>
            <button class="level-tab" data-level="cm2" onclick="selectLevel('cm2')">CM2</button>
        </div>
        <p class="level-desc" id="level-desc">Notions de base</p>

        <div class="mode-selector" role="group" aria-label="Choix du mode">
            <button class="mode-btn selected" onclick="selectMode('cercle')" id="mode-cercle" type="button" aria-pressed="true">
                <span class="mode-icon" aria-hidden="true">⭕</span>Le cercle
            </button>
            <button class="mode-btn" onclick="selectMode('droites')" id="mode-droites" type="button" aria-pressed="false">
                <span class="mode-icon" aria-hidden="true">📏</span>Droites
            </button>
            <button class="mode-btn" onclick="selectMode('figures')" id="mode-figures" type="button" aria-pressed="false">
                <span class="mode-icon" aria-hidden="true">🔷</span>Figures
            </button>
            <button class="mode-btn" onclick="selectMode('angles')" id="mode-angles" type="button" aria-pressed="false">
                <span class="mode-icon" aria-hidden="true">📐</span>Angles
            </button>
            <button class="mode-btn" onclick="selectMode('mesures')" id="mode-mesures" type="button" aria-pressed="false">
                <span class="mode-icon" aria-hidden="true">📏</span>Mesures
            </button>
            <button class="mode-btn" onclick="selectMode('melange')" id="mode-melange" type="button" aria-pressed="false">
                <span class="mode-icon" aria-hidden="true">🎲</span>Mélange
            </button>
        </div>

        <div class="round-selector">
            <span class="round-label">Questions :</span>
            <div class="round-btns">
                <button class="round-btn" data-size="5" onclick="selectRoundSize(5)">5</button>
                <button class="round-btn active" data-size="10" onclick="selectRoundSize(10)">10</button>
                <button class="round-btn" data-size="20" onclick="selectRoundSize(20)">20</button>
            </div>
        </div>

        <button class="btn" onclick="startGame()">🚀 C'est parti !</button>
        <br>
        <a class="nav-link" href="../index.html">🏠 Accueil</a>
    </div>

    <!-- ══════════════ ÉCRAN DE JEU ══════════════ -->
    <div id="game-screen">
        <div class="game-controls">
            <button class="btn-game-ctrl" onclick="pauseGame()">⏸️ Pause</button>
            <button class="btn-game-ctrl" onclick="stopSeries()">⏹️ Arrêter</button>
        </div>

        <div class="stats-bar">
            <div class="stat-box">
                <div class="label">Carte</div>
                <div class="value" id="card-count" aria-live="polite">1 / 10</div>
            </div>
            <div class="stat-box">
                <div class="label"><span aria-hidden="true">⏱</span> Chrono</div>
                <div class="value" id="timer" aria-live="off">00:00</div>
            </div>
            <div class="stat-box">
                <div class="label"><span aria-hidden="true">✅</span> Score</div>
                <div class="value" id="score" aria-live="polite">0</div>
            </div>
        </div>

        <div class="card-container">
            <div class="card" id="card">
                <div class="card-face card-front" id="card-front">
                    <div class="card-label" id="card-mode-label">Le cercle</div>
                    <div id="question-area"></div>
                    <div class="card-number" id="card-num">#1</div>
                </div>
                <div class="card-face card-back" id="card-back">
                    <div class="result-label">La réponse est</div>
                    <div class="result" id="result"></div>
                    <div class="result-icon" id="result-icon">✅</div>
                    <div class="explanation" id="explanation"></div>
                </div>
            </div>
        </div>

        <div class="answer-zone" id="answer-zone"></div>
        <button class="btn-next" id="btn-next" onclick="nextCard()">Carte suivante ➜</button>
    </div>

    <!-- ══════════════ ÉCRAN DE PAUSE ══════════════ -->
    <div id="pause-screen">
        <h2 id="pause-title">🎉 Bravo !</h2>
        <p class="pause-stats">Score : <strong id="pause-score">0 / 10</strong></p>
        <p class="pause-stats">Temps : <strong id="pause-time">00:00</strong></p>
        <p class="pause-stats" id="pause-message"></p>
        <div class="pause-buttons">
            <button class="btn btn-continue" onclick="continueGame()">🔄 Encore 10 !</button>
            <button class="btn btn-stop" onclick="resetGame()">🏠 Accueil</button>
        </div>
    </div>

    <!-- ══════════════ OVERLAY PAUSE EN JEU ══════════════ -->
    <div id="ingame-pause-overlay">
        <div class="pause-overlay-box">
            <h2>⏸️ Pause</h2>
            <p>Prends ton temps !</p>
            <div class="pause-overlay-buttons">
                <button class="btn btn-resume" onclick="resumeGame()">▶️ Reprendre</button>
                <button class="btn btn-quit" onclick="stopSeries()">⏹️ Arrêter la série</button>
            </div>
        </div>
    </div>

    <script src="../progress.js"></script>
    <script src="../shared.js"></script>
    <script src="questions/cercle.js"></script>
    <script src="questions/droites.js"></script>
    <script src="questions/figures.js"></script>
    <script src="questions/angles.js"></script>
    <script src="questions/mesures.js"></script>
    <script src="app.js"></script>
</body>
</html>
