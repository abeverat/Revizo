<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz QCM — CartesToTo</title>
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Discovery screen ── -->
<div id="discovery-screen" class="discovery-screen" style="display:none">
    <h1>🤖 Quiz QCM</h1>
    <p>Recherche d'un serveur Ollama sur le réseau…</p>
    <div class="scan-box">
        <div id="scan-status">Initialisation du scan…</div>
        <div class="progress-bar"><div class="progress-fill" id="scan-progress"></div></div>
        <div id="scan-log" class="scan-log"></div>
        <div id="scan-found" class="scan-found" style="display:none">
            <div id="found-url"></div>
        </div>
    </div>
    <button id="btn-to-config" class="btn-main" style="display:none" onclick="goToConfig()">Configurer le quiz ➜</button>
    <div class="manual-input">
        <p>Ou entrez l'IP manuellement :</p>
        <input type="text" id="manual-ip" placeholder="ex: 192.168.1.42">
        <button onclick="tryManualIP()">Tester</button>
    </div>
    <div id="discovery-error" class="error-msg" style="display:none"></div>
    <a href="../index.html" class="nav-link">🏠 Accueil</a>
</div>

<!-- ── Config screen ── -->
<div id="config-screen" class="config-screen" style="display:none">
    <h1>⚙️ Configuration</h1>
    <div id="server-badge" class="server-badge"></div>

    <div class="config-section">
        <label>Modèle :</label>
        <select id="model-select"></select>
    </div>

    <div class="config-section">
        <label>Matière :</label>
        <div class="subject-grid">
            <button class="subject-btn selected" onclick="selectSubject(this,'Mathématiques CM2')">🔢 Maths</button>
            <button class="subject-btn" onclick="selectSubject(this,'Français CM2')">📖 Français</button>
            <button class="subject-btn" onclick="selectSubject(this,'Histoire CM2')">🏰 Histoire</button>
            <button class="subject-btn" onclick="selectSubject(this,'Géographie CM2')">🌍 Géographie</button>
            <button class="subject-btn" onclick="selectSubject(this,'Sciences CM2')">🔬 Sciences</button>
            <button class="subject-btn" onclick="selectSubject(this,'Anglais CM2')">🇬🇧 Anglais</button>
            <button class="subject-btn" onclick="selectSubject(this,'Culture générale CM2')">🎓 Culture G.</button>
            <button class="subject-btn" onclick="selectSubject(this,'__custom__')">✏️ Personnalisé</button>
        </div>
        <input type="text" id="custom-topic" class="custom-input" placeholder="Entrez votre sujet…" style="display:none">
    </div>

    <button class="btn-main" onclick="startQuiz()">🚀 Lancer le quiz</button>
    <button class="btn-small" onclick="backToDiscovery()">← Changer de serveur</button>
</div>

<!-- ── Loading screen ── -->
<div id="loading-screen" class="loading-screen" style="display:none">
    <div class="loading-spinner"></div>
    <p id="loading-text">Le LLM prépare tes questions…</p>
    <div id="loading-error" class="error-msg" style="display:none"></div>
</div>

<!-- ── Start screen (hidden, needed by shared.js) ── -->
<div id="start-screen" class="start-screen" style="display:none">
    <h1>Quiz QCM</h1>
    <p id="card-mode-label"></p>
</div>

<!-- ── Game screen ── -->
<div id="game-screen" class="game-screen" style="display:none">
    <div class="stats-bar">
        <span>✅ <span id="score">0</span></span>
        <span>❌ <span id="errors">0</span></span>
        <span>⏱ <span id="timer">0:00</span></span>
        <button id="pause-btn" onclick="pauseGame()">⏸</button>
    </div>

    <div class="card" id="card">
        <div class="card-inner" id="card-inner">
            <div class="card-front">
                <div id="question-area"></div>
                <div id="answer-zone"></div>
            </div>
            <div class="card-back">
                <div id="result-icon" class="result-icon"></div>
                <div id="result-text" class="result-text"></div>
                <div id="explanation" class="explanation"></div>
                <button class="btn-next" onclick="nextCard()">Suivante ➜</button>
            </div>
        </div>
    </div>
</div>

<!-- ── Pause screen ── -->
<div id="pause-screen" class="pause-screen" style="display:none">
    <div class="pause-content">
        <h2>⏸ Pause</h2>
        <p>Score : <span id="pause-score">0</span> / <span id="pause-total">0</span></p>
        <button class="btn-main" onclick="resumeGame()">▶️ Reprendre</button>
        <button class="btn-main" onclick="continueQuiz()">🔄 Encore 10 !</button>
        <button class="btn-main" onclick="backToConfig()">📋 Menu</button>
    </div>
</div>

<script src="../shared.js"></script>
<script src="app.js"></script>

</body>
</html>
