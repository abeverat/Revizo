<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartes Toto - Grammaire CM2</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        body {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn {
            background: linear-gradient(135deg, #fc4a1a, #f7b733);
            box-shadow: 0 8px 20px rgba(252,74,26,0.4);
        }

        .btn:hover {
            box-shadow: 0 12px 28px rgba(252,74,26,0.5);
        }

        #game-screen {
            max-width: 580px;
        }

        .card-container {
            width: 320px;
            height: 400px;
        }

        /* ── Mode selector ── */
        .mode-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .mode-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            padding: 14px 24px;
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            cursor: pointer;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            color: #fff;
            transition: all 0.3s;
            text-align: center;
            min-width: 140px;
        }

        .mode-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-3px);
        }

        .mode-btn.selected {
            background: rgba(255,255,255,0.9);
            color: #11998e;
            border-color: #fff;
            transform: scale(1.05);
        }

        .mode-btn .mode-icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 6px;
        }

        /* ── Sentence on card ── */
        .sentence-text {
            font-family: 'Nunito', sans-serif;
            font-size: 1.35rem;
            color: #333;
            line-height: 1.6;
            padding: 0 10px;
            text-align: center;
        }

        .sentence-text .blank {
            display: inline-block;
            min-width: 70px;
            border-bottom: 3px dashed #11998e;
            color: #11998e;
            font-weight: 900;
            padding: 0 4px;
            margin: 0 2px;
        }

        .sentence-text .highlight {
            background: linear-gradient(to top, rgba(17,153,142,0.25) 40%, transparent 40%);
            font-weight: 900;
            color: #0a6b63;
            padding: 0 3px;
            border-radius: 3px;
        }

        .question-source-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-family: 'Fredoka One', cursive;
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #fff;
        }

        .question-source-badge.ai {
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            box-shadow: 0 4px 12px rgba(255,94,98,0.35);
        }

        .question-source-badge.local {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            box-shadow: 0 4px 12px rgba(79,172,254,0.35);
        }

        /* ── In-game AI indicator ── */
        .ingame-ai-indicator {
            font-family: 'Nunito', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255,255,255,0.85);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            white-space: nowrap;
        }

        .ingame-ai-indicator .ai-mini-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .ingame-ai-indicator .ai-mini-dot.generating {
            background: #ffd700;
            animation: pulse-dot 1s infinite alternate;
        }

        .ingame-ai-indicator .ai-mini-dot.idle {
            background: #43e97b;
        }

        .ingame-ai-indicator .ai-mini-dot.offline {
            background: #ff5858;
        }

        .card-front .instruction {
            font-family: 'Fredoka One', cursive;
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 14px;
            letter-spacing: 1px;
        }

        .card-back .result {
            font-size: 2rem;
            padding: 0 16px;
            text-align: center;
            line-height: 1.5;
        }

        .card-back .explanation {
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.85);
            margin-top: 12px;
            padding: 0 16px;
            line-height: 1.4;
            text-align: center;
        }

        /* ── Choice buttons (for MCQ modes) ── */
        .choice-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .choice-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 1.15rem;
            padding: 12px 22px;
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 16px;
            cursor: pointer;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            color: #fff;
            transition: all 0.2s;
            min-width: 80px;
        }

        .choice-btn:hover {
            background: rgba(255,255,255,0.35);
            transform: translateY(-2px);
        }

        /* ── Text input for conjugation ── */
        #grammar-input {
            width: 200px;
        }

        /* ── AI status indicator ── */
        .ai-control-panel {
            width: 100%;
            max-width: 520px;
            margin: 14px auto 0;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .ai-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 30px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.4s;
        }

        .ai-status .ai-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #aaa;
            transition: background 0.4s;
        }

        .ai-status.searching .ai-dot {
            background: #ffd700;
            animation: pulse-dot 1s infinite alternate;
        }

        .ai-status.found .ai-dot {
            background: #43e97b;
        }

        .ai-status.offline .ai-dot {
            background: #ff5858;
        }

        .ai-model-picker {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: rgba(255,255,255,0.85);
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            width: 100%;
        }

        .ai-model-picker label {
            opacity: 0.9;
        }

        .ai-model-picker select {
            min-width: 230px;
            max-width: 100%;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
            color: #fff;
            backdrop-filter: blur(8px);
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            outline: none;
        }

        .ai-model-picker select option {
            color: #222;
            background: #fff;
        }

        @keyframes pulse-dot {
            from { opacity: 0.4; transform: scale(0.8); }
            to   { opacity: 1;   transform: scale(1.2); }
        }

        /* ── Log panel ── */
        .log-toggle {
            display: inline-block;
            margin-top: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
            border: none;
            background: none;
            font-family: 'Nunito', sans-serif;
        }

        .log-toggle:hover {
            color: rgba(255,255,255,0.8);
        }

        .log-panel {
            display: none;
            width: 90%;
            max-width: 520px;
            max-height: 200px;
            margin: 10px auto 0;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            font-family: 'Courier New', monospace;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.75);
            text-align: left;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }

        .log-panel.visible {
            display: block;
        }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            #start-screen h1 { font-size: 2.4rem; }
            .card-container { width: 280px; height: 370px; }
            .sentence-text { font-size: 1.15rem; }
            .card-back .result { font-size: 1.6rem; }
            .choice-btn { font-size: 1rem; padding: 10px 16px; min-width: 70px; }
            .mode-btn { min-width: 120px; font-size: 0.9rem; padding: 10px 16px; }
            .ai-control-panel { padding: 10px; gap: 8px; }
            .ai-model-picker { flex-direction: column; align-items: stretch; }
            .ai-model-picker label { text-align: left; margin-left: 2px; }
            .ai-model-picker select { min-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>
    <canvas id="confetti-canvas"></canvas>

    <!-- ══════════════ ÉCRAN D'ACCUEIL ══════════════ -->
    <div id="start-screen">
        <h1>📝 Grammaire Toto</h1>
        <p>Entraîne-toi en grammaire — CM2</p>

        <div class="mode-selector">
            <div class="mode-btn selected" onclick="selectMode('homophones')" id="mode-homophones">
                <span class="mode-icon">🔤</span>Homophones
            </div>
            <div class="mode-btn" onclick="selectMode('conjugaison')" id="mode-conjugaison">
                <span class="mode-icon">✏️</span>Conjugaison
            </div>
            <div class="mode-btn" onclick="selectMode('nature')" id="mode-nature">
                <span class="mode-icon">🏷️</span>Nature
            </div>
            <div class="mode-btn" onclick="selectMode('accord')" id="mode-accord">
                <span class="mode-icon">🤝</span>Accords
            </div>
        </div>

        <button class="btn" onclick="startGame()">🚀 C'est parti !</button>
        <div class="ai-control-panel" id="ai-control-panel">
            <div class="ai-status searching" id="ai-status">
                <span class="ai-dot"></span>
                <span id="ai-status-text">🔍 Recherche du serveur IA…</span>
            </div>
            <div class="ai-model-picker" id="ai-model-picker">
                <label for="ai-model-select">Modèle IA</label>
                <select id="ai-model-select" aria-label="Choisir le modèle IA"></select>
            </div>
        </div>
        <br>
        <button class="log-toggle" onclick="toggleLog()">📋 Voir les logs</button>
        <div class="log-panel" id="log-panel"></div>
        <br>
        <a class="nav-link" href="index.html">🃏 Multiplications</a>
        <span style="color:rgba(255,255,255,0.5);margin:0 6px;">•</span>
        <a class="nav-link" href="fractions.html">🥧 Fractions</a>
    </div>

    <!-- ══════════════ ÉCRAN DE JEU ══════════════ -->
    <div id="game-screen">
        <div class="game-controls">
            <button class="btn-game-ctrl" onclick="pauseGame()">⏸️ Pause</button>
            <button class="btn-game-ctrl" onclick="stopSeries()">⏹️ Arrêter</button>
            <span class="ingame-ai-indicator" id="ingame-ai-indicator"></span>
        </div>

        <div class="stats-bar">
            <div class="stat-box">
                <div class="label">Carte</div>
                <div class="value" id="card-count">1 / 10</div>
            </div>
            <div class="stat-box">
                <div class="label">⏱ Chrono</div>
                <div class="value" id="timer">00:00</div>
            </div>
            <div class="stat-box">
                <div class="label">✅ Score</div>
                <div class="value" id="score">0</div>
            </div>
        </div>

        <div class="card-container">
            <div class="card" id="card">
                <div class="card-face card-front" id="card-front">
                    <div class="card-label" id="card-mode-label">Homophones</div>
                    <div id="question-area"></div>
                    <div class="card-number" id="card-num">#1</div>
                </div>
                <div class="card-face card-back" id="card-back">
                    <div class="result-label">La réponse est</div>
                    <div class="result" id="result"></div>
                    <div class="result-icon" id="result-icon">✅</div>
                    <div class="explanation" id="explanation"></div>
                </div>
            </div>
        </div>

        <div class="answer-zone" id="answer-zone"></div>
        <button class="btn-next" id="btn-next" onclick="nextCard()">Carte suivante ➜</button>
    </div>

    <!-- ══════════════ ÉCRAN DE PAUSE ══════════════ -->
    <div id="pause-screen">
        <h2 id="pause-title">🎉 Bravo !</h2>
        <p class="pause-stats">Score : <strong id="pause-score">0 / 10</strong></p>
        <p class="pause-stats">Temps : <strong id="pause-time">00:00</strong></p>
        <p class="pause-stats" id="pause-message"></p>
        <div class="pause-buttons">
            <button class="btn btn-continue" onclick="continueGame()">🔄 Encore 10 !</button>
            <button class="btn btn-stop" onclick="resetGame()">🏠 Accueil</button>
        </div>
    </div>

    <!-- ══════════════ OVERLAY PAUSE EN JEU ══════════════ -->
    <div id="ingame-pause-overlay">
        <div class="pause-overlay-box">
            <h2>⏸️ Pause</h2>
            <p>Prends ton temps !</p>
            <div class="pause-overlay-buttons">
                <button class="btn btn-resume" onclick="resumeGame()">▶️ Reprendre</button>
                <button class="btn btn-quit" onclick="stopSeries()">⏹️ Arrêter la série</button>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script src="ollama.js"></script>
    <script>
        // ═══════════════════════════════════════
        // Grammar-specific logic — CM2
        // ═══════════════════════════════════════
        let gameMode = 'homophones';
        let currentAnswer = null;
        let currentExplanation = '';
        let currentQuestionSource = 'local';

        const questionArea  = document.getElementById('question-area');
        const cardModeLabel = document.getElementById('card-mode-label');
        const explanationEl = document.getElementById('explanation');

        // ── Mode selection ──
        function selectMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('mode-' + mode).classList.add('selected');
        }

        // ── Utility ──
        function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function pick(arr) { return arr[randInt(0, arr.length - 1)]; }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = randInt(0, i);
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function sourceBadgeHtml() {
            if (currentQuestionSource === 'ai') {
                return `<div class="question-source-badge ai">✨ IA</div>`;
            }
            return `<div class="question-source-badge local">📚 Locale</div>`;
        }

        function updateIngameAiIndicator() {
            const el = document.getElementById('ingame-ai-indicator');
            if (!el) return;

            if (!Ollama.isReady) {
                el.innerHTML = `<span class="ai-mini-dot offline"></span> Hors-ligne`;
                return;
            }

            const count = Ollama.bufferCount(gameMode);
            const generating = Ollama.isGenerating;

            if (generating) {
                el.innerHTML = `<span class="ai-mini-dot generating"></span> IA… ${count} prête${count > 1 ? 's' : ''}`;
            } else if (count > 0) {
                el.innerHTML = `<span class="ai-mini-dot idle"></span> IA : ${count} prête${count > 1 ? 's' : ''}`;
            } else {
                el.innerHTML = `<span class="ai-mini-dot idle"></span> IA : 0`;
            }
        }

        setInterval(updateIngameAiIndicator, 1000);

        // ═══════════════════════════════════════
        // Question banks
        // ═══════════════════════════════════════

        // ── HOMOPHONES ──
        const homophoneQuestions = [
            // ─── a / à ───
            { sentence: "Il ___ un chien très gentil.", answer: "a", choices: ["a","à"], explanation: "« a » = verbe avoir (il a). On peut remplacer par « avait »." },
            { sentence: "Elle va ___ l'école tous les matins.", answer: "à", choices: ["a","à"], explanation: "« à » = préposition (indique le lieu). On ne peut pas dire « avait l'école »." },
            { sentence: "Mon frère ___ oublié son cartable.", answer: "a", choices: ["a","à"], explanation: "« a » = verbe avoir. On peut dire « avait oublié »." },
            { sentence: "Je pense ___ mes vacances.", answer: "à", choices: ["a","à"], explanation: "« à » = préposition. On ne peut pas remplacer par « avait »." },
            { sentence: "La maîtresse ___ distribué les cahiers.", answer: "a", choices: ["a","à"], explanation: "« a » = verbe avoir (elle a distribué)." },
            { sentence: "Nous irons ___ la piscine demain.", answer: "à", choices: ["a","à"], explanation: "« à » = préposition de lieu." },
            { sentence: "Papa ___ réparé le vélo.", answer: "a", choices: ["a","à"], explanation: "« a » = verbe avoir. On peut dire « avait réparé »." },
            { sentence: "Le gâteau est ___ la vanille.", answer: "à", choices: ["a","à"], explanation: "« à » = préposition (saveur). On ne peut pas dire « avait la vanille »." },
            { sentence: "Le directeur ___ parlé aux élèves.", answer: "a", choices: ["a","à"], explanation: "« a » = verbe avoir (il a parlé)." },
            { sentence: "Elle joue ___ la corde ___ sauter.", answer: "à", choices: ["a","à"], explanation: "« à » = préposition. On ne peut pas remplacer par « avait »." },
            { sentence: "Ce film ___ l'air très drôle.", answer: "a", choices: ["a","à"], explanation: "« a » = verbe avoir (avoir l'air). On peut dire « avait l'air »." },
            { sentence: "Grâce ___ toi, on a gagné !", answer: "à", choices: ["a","à"], explanation: "« à » = préposition. « Grâce avait toi » ne veut rien dire." },
            { sentence: "Ma cousine ___ sept ans.", answer: "a", choices: ["a","à"], explanation: "« a » = verbe avoir (elle a sept ans)." },
            { sentence: "Nous habitons ___ Paris.", answer: "à", choices: ["a","à"], explanation: "« à » = préposition de lieu." },
            { sentence: "Le chat ___ attrapé une souris.", answer: "a", choices: ["a","à"], explanation: "« a » = verbe avoir. On peut dire « avait attrapé »." },
            { sentence: "Il commence ___ pleuvoir.", answer: "à", choices: ["a","à"], explanation: "« à » = préposition (commencer à). On ne dit pas « avait pleuvoir »." },

            // ─── et / est ───
            { sentence: "Le chat ___ noir et blanc.", answer: "est", choices: ["et","est"], explanation: "« est » = verbe être. On peut dire « était »." },
            { sentence: "J'ai acheté du pain ___ du beurre.", answer: "et", choices: ["et","est"], explanation: "« et » = conjonction (ajoute deux choses). On peut dire « et puis »." },
            { sentence: "Ma sœur ___ partie en voyage.", answer: "est", choices: ["et","est"], explanation: "« est » = verbe être (elle est partie)." },
            { sentence: "Il aime les pommes ___ les poires.", answer: "et", choices: ["et","est"], explanation: "« et » relie deux compléments. On peut dire « et aussi »." },
            { sentence: "Cette histoire ___ très amusante.", answer: "est", choices: ["et","est"], explanation: "« est » = verbe être. On peut dire « était »." },
            { sentence: "Prends ton manteau ___ tes gants.", answer: "et", choices: ["et","est"], explanation: "« et » = conjonction qui relie deux noms." },
            { sentence: "Mon voisin ___ très sympathique.", answer: "est", choices: ["et","est"], explanation: "« est » = verbe être. On peut dire « était sympathique »." },
            { sentence: "J'ai un cahier ___ un crayon.", answer: "et", choices: ["et","est"], explanation: "« et » = conjonction. On peut dire « et aussi un crayon »." },
            { sentence: "Le temps ___ magnifique aujourd'hui.", answer: "est", choices: ["et","est"], explanation: "« est » = verbe être. On peut dire « était magnifique »." },
            { sentence: "Range tes livres ___ tes crayons.", answer: "et", choices: ["et","est"], explanation: "« et » relie deux compléments d'objet." },
            { sentence: "Ce restaurant ___ fermé le lundi.", answer: "est", choices: ["et","est"], explanation: "« est » = verbe être. On peut dire « était fermé »." },
            { sentence: "Il fait beau ___ chaud.", answer: "et", choices: ["et","est"], explanation: "« et » relie deux adjectifs." },
            { sentence: "La récréation ___ bientôt terminée.", answer: "est", choices: ["et","est"], explanation: "« est » = verbe être. On peut dire « était terminée »." },
            { sentence: "Léa mange une tartine ___ boit un jus.", answer: "et", choices: ["et","est"], explanation: "« et » relie deux actions. On peut dire « et puis boit »." },

            // ─── son / sont ───
            { sentence: "Les enfants ___ dans la cour.", answer: "sont", choices: ["son","sont"], explanation: "« sont » = verbe être (ils sont). On peut dire « étaient »." },
            { sentence: "Il a perdu ___ stylo.", answer: "son", choices: ["son","sont"], explanation: "« son » = déterminant possessif (le sien). On peut dire « mon stylo »." },
            { sentence: "Ces gâteaux ___ délicieux.", answer: "sont", choices: ["son","sont"], explanation: "« sont » = verbe être. On peut dire « étaient délicieux »." },
            { sentence: "Elle adore ___ petit chat.", answer: "son", choices: ["son","sont"], explanation: "« son » = déterminant possessif. On peut dire « mon petit chat »." },
            { sentence: "Les oiseaux ___ partis vers le sud.", answer: "sont", choices: ["son","sont"], explanation: "« sont » = verbe être (ils sont partis)." },
            { sentence: "Léo range ___ bureau.", answer: "son", choices: ["son","sont"], explanation: "« son » = déterminant possessif. On peut dire « mon bureau »." },
            { sentence: "Les magasins ___ ouverts le samedi.", answer: "sont", choices: ["son","sont"], explanation: "« sont » = verbe être. On peut dire « étaient ouverts »." },
            { sentence: "Il a oublié ___ goûter.", answer: "son", choices: ["son","sont"], explanation: "« son » = déterminant possessif. On peut dire « mon goûter »." },
            { sentence: "Les résultats ___ affichés au tableau.", answer: "sont", choices: ["son","sont"], explanation: "« sont » = verbe être. On peut dire « étaient affichés »." },

            { sentence: "Les oiseaux ___ dans le ciel.", answer: "volent", choices: ["vole","volent","voles","volons"], explanation: "Sujet pluriel « les oiseaux » → volent (3e pers. pluriel)." },
            { sentence: "Ma mère et moi ___ au marché.", answer: "allons", choices: ["va","vais","allons","allez"], explanation: "« Ma mère et moi » = nous → allons." },
            { sentence: "Le chien ___ dans le jardin.", answer: "court", choices: ["court","courent","cours","courons"], explanation: "Sujet singulier « le chien » → court (3e pers. singulier)." },
            { sentence: "Les nuages ___ le soleil.", answer: "cachent", choices: ["cache","cachent","caches","cachons"], explanation: "Sujet pluriel « les nuages » → cachent." },
            { sentence: "Toi et moi ___ des amis.", answer: "sommes", choices: ["est","êtes","sommes","sont"], explanation: "« Toi et moi » = nous → sommes." },
            { sentence: "La pluie et le vent ___ violents.", answer: "sont", choices: ["est","sont","suis","sommes"], explanation: "Deux sujets coordonnés → sont (pluriel)." },
            { sentence: "Qui ___ à la porte ?", answer: "frappe", choices: ["frappe","frappent","frappes","frappons"], explanation: "« Qui » sujet singulier → frappe." },
            { sentence: "Les élèves et leur professeur ___ en sortie.", answer: "partent", choices: ["part","partent","partons","partez"], explanation: "Sujets coordonnés = ils → partent." },

            // ─── Accord déterminant + nom ───
            { sentence: "___ tables sont rangées.", answer: "Les", choices: ["Le","La","Les","Un"], explanation: "« tables » = féminin pluriel → Les." },
            { sentence: "J'ai vu ___ éléphant au zoo.", answer: "un", choices: ["un","une","des","le"], explanation: "« éléphant » = masculin singulier → un." },
            { sentence: "___ chatte dort sur le fauteuil.", answer: "La", choices: ["Le","La","Les","Un"], explanation: "« chatte » = féminin singulier → La." },
            { sentence: "Il a acheté ___ crayons.", answer: "des", choices: ["un","une","le","des"], explanation: "« crayons » = pluriel → des." },
        ];

        // ═══════════════════════════════════════
        // Banque par mode — on pioche aléatoirement
        // ═══════════════════════════════════════
        let usedIndices = {};  // per-mode used indices

        function pickQuestion(bank, mode) {
            // 1. Try AI-generated question first
            if (Ollama.isReady) {
                const aiQ = Ollama.getQuestion(mode);
                if (aiQ) {
                    console.log(`[Grammar] Using AI question for ${mode}`);
                    currentQuestionSource = 'ai';
                    return aiQ;
                }
            }

            // 2. Fallback to static bank
            if (!usedIndices[mode]) usedIndices[mode] = [];
            if (usedIndices[mode].length >= bank.length) usedIndices[mode] = [];
            let idx;
            do { idx = randInt(0, bank.length - 1); } while (usedIndices[mode].includes(idx));
            usedIndices[mode].push(idx);
            currentQuestionSource = 'local';
            return bank[idx];
        }

        function getBank() {
            switch (gameMode) {
                case 'homophones':  return homophoneQuestions;
                case 'conjugaison': return conjugaisonQuestions;
                case 'nature':      return natureQuestions;
                case 'accord':      return accordQuestions;
            }
        }

        // ═══════════════════════════════════════
        // Required by shared.js
        // ═══════════════════════════════════════

        function generateQuestion() {
            switch (gameMode) {
                case 'homophones':  generateHomophone(); break;
                case 'conjugaison': generateConjugaison(); break;
                case 'nature':      generateNature(); break;
                case 'accord':      generateAccord(); break;
            }
        }

        // ── HOMOPHONES ──
        function generateHomophone() {
            const q = pickQuestion(homophoneQuestions, 'homophones');
            cardModeLabel.textContent = 'Choisis le bon homophone';

            const display = q.sentence.replace('___', '<span class="blank">???</span>');
            questionArea.innerHTML = `${sourceBadgeHtml()}<div class="sentence-text">${display}</div>`;

            currentAnswer = q.answer.toLowerCase();
            currentExplanation = q.explanation;

            const btns = shuffle(q.choices).map(c =>
                `<button class="choice-btn" onclick="validateChoice('${c}')">${c}</button>`
            ).join('');
            answerZone.innerHTML = `<div class="choice-btns">${btns}</div>`;
        }

        // ── CONJUGAISON ──
        function generateConjugaison() {
            const q = pickQuestion(conjugaisonQuestions, 'conjugaison');
            cardModeLabel.textContent = 'Conjugue le verbe';

            const display = q.sentence.replace('___', '<span class="blank">???</span>');
            questionArea.innerHTML = `
                ${sourceBadgeHtml()}
                <div class="sentence-text">${display}</div>
                <div class="instruction">${q.hint}</div>`;

            currentAnswer = q.answer.toLowerCase();
            currentExplanation = q.explanation;

            answerZone.innerHTML = `
                <input type="text" class="answer-input" id="grammar-input" placeholder="?" autocomplete="off" autocapitalize="off" spellcheck="false">
                <button class="btn-validate" onclick="validateAnswer()">OK</button>
            `;
            setTimeout(() => document.getElementById('grammar-input').focus(), 100);
        }

        // ── NATURE DES MOTS ──
        function generateNature() {
            const q = pickQuestion(natureQuestions, 'nature');
            cardModeLabel.textContent = 'Quelle est la nature du mot ?';

            questionArea.innerHTML = `${sourceBadgeHtml()}<div class="sentence-text">${q.sentence}</div>`;

            currentAnswer = q.answer.toLowerCase();
            currentExplanation = q.explanation;

            const btns = shuffle(q.choices).map(c =>
                `<button class="choice-btn" onclick="validateChoice('${c}')">${c}</button>`
            ).join('');
            answerZone.innerHTML = `<div class="choice-btns">${btns}</div>`;
        }

        // ── ACCORDS ──
        function generateAccord() {
            const q = pickQuestion(accordQuestions, 'accord');
            cardModeLabel.textContent = 'Choisis le bon accord';

            const display = q.sentence.replace('___', '<span class="blank">???</span>');
            questionArea.innerHTML = `${sourceBadgeHtml()}<div class="sentence-text">${display}</div>`;

            currentAnswer = q.answer.toLowerCase();
            currentExplanation = q.explanation;

            // Deduplicate choices for display
            const unique = [...new Set(q.choices)];
            const btns = shuffle(unique).map(c =>
                `<button class="choice-btn" onclick="validateChoice('${c}')">${c}</button>`
            ).join('');
            answerZone.innerHTML = `<div class="choice-btns">${btns}</div>`;
        }

        // ═══════════════════════════════════════
        // Validation
        // ═══════════════════════════════════════
        function validateChoice(choice) {
            if (isFlipped) return;
            const isCorrect = choice.toLowerCase() === currentAnswer;
            explanationEl.textContent = currentExplanation;
            showResult(isCorrect, currentAnswer);
        }

        function validateAnswer() {
            if (isFlipped) return;
            const input = document.getElementById('grammar-input');
            const userVal = input.value.trim().toLowerCase();

            if (!userVal) {
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 500);
                return;
            }

            const isCorrect = userVal === currentAnswer;
            input.disabled = true;
            explanationEl.textContent = currentExplanation;
            showResult(isCorrect, currentAnswer);
        }

        function getFocusInput() {
            return document.getElementById('grammar-input');
        }

        function canEnterValidate() {
            // Only allow Enter for text-input modes
            return gameMode === 'conjugaison';
        }

        // ═══════════════════════════════════════
        // Log panel toggle
        // ═══════════════════════════════════════
        function toggleLog() {
            document.getElementById('log-panel').classList.toggle('visible');
        }
        Ollama.attachLog(document.getElementById('log-panel'));

        // ═══════════════════════════════════════
        // Ollama auto-discovery on page load
        // ═══════════════════════════════════════
        const aiStatusEl   = document.getElementById('ai-status');
        const aiStatusText = document.getElementById('ai-status-text');
        const aiModelPicker = document.getElementById('ai-model-picker');
        const aiModelSelect = document.getElementById('ai-model-select');

        function refreshModelPicker(selectedModel) {
            const models = Ollama.models || [];
            if (!models || models.length <= 1) {
                aiModelPicker.style.display = 'none';
                aiModelSelect.innerHTML = '';
                return;
            }

            aiModelPicker.style.display = 'flex';
            const currentOptions = Array.from(aiModelSelect.options).map(o => o.value);
            const sameList = currentOptions.length === models.length && currentOptions.every((v, i) => v === models[i]);

            if (!sameList) {
                aiModelSelect.innerHTML = '';
                models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model;
                    option.textContent = model;
                    aiModelSelect.appendChild(option);
                });
            }

            aiModelSelect.value = selectedModel;
        }

        aiModelSelect.addEventListener('change', (e) => {
            const chosen = e.target.value;
            const ok = Ollama.setModel(chosen);
            if (!ok) {
                aiModelSelect.value = Ollama.model || '';
            }
        });

        Ollama.onStatus = (status, url, model, backendType) => {
            aiStatusEl.className = 'ai-status ' + status;
            switch (status) {
                case 'searching':
                    aiStatusText.textContent = '🔍 Recherche du serveur IA…';
                    aiModelPicker.style.display = 'none';
                    break;
                case 'found':
                    const shortModel = model.split(':')[0];
                    const backendName = backendType === 'lmstudio' ? 'LM Studio' : 'Ollama';
                    aiStatusText.textContent = `🤖 ${backendName} (${shortModel})`;
                    refreshModelPicker(model);
                    break;
                case 'offline':
                    aiStatusText.textContent = '📦 Mode hors-ligne (banque locale)';
                    aiModelPicker.style.display = 'none';
                    break;
            }
        };

        // Start discovery immediately
        Ollama.discover();
    </script>
</body>
</html>
